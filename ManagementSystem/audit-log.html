<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Audit log - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .audit-filters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            align-items: end;
            margin-bottom: 22px;
            padding: 18px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        .audit-filters label {
            display: grid;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 700;
        }
        .audit-filters input,
        .audit-filters select {
            width: 100%;
        }
        .audit-details {
            max-width: 460px;
            white-space: pre-wrap;
            word-break: break-word;
            margin: 0;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(15, 23, 42, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px;
        }
        .muted {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="content-wrapper">
            <div class="header-actions">
                <p class="muted" style="margin:0;">Trasabilitate pentru actiuni admin importante.</p>
                <button class="btn btn-primary" id="refresh-btn">Reincarca</button>
            </div>

            <div id="error-msg" class="alert error"></div>

            <section class="audit-filters">
                <label>
                    Actiune
                    <input type="text" id="filter-action" placeholder="ex: submission_published">
                </label>
                <label>
                    Target type
                    <input type="text" id="filter-target-type" placeholder="ex: content_submission">
                </label>
                <label>
                    Target ID
                    <input type="number" id="filter-target-id" min="1" placeholder="ex: 123">
                </label>
                <label>
                    Limit
                    <select id="filter-limit">
                        <option value="25">25</option>
                        <option value="50" selected>50</option>
                        <option value="100">100</option>
                        <option value="200">200</option>
                    </select>
                </label>
                <button class="btn btn-secondary" id="clear-filters-btn">Sterge filtre</button>
            </section>

            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Actiune</th>
                        <th>Target</th>
                        <th>Admin user</th>
                        <th>Detalii</th>
                    </tr>
                </thead>
                <tbody id="audit-log-table-body">
                    <tr><td colspan="5">Se incarca...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/audit-log.js"></script>
</body>
</html>
