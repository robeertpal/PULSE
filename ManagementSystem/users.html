<!DOCTYPE html>
<html lang="ro">
<head>

    <meta charset="UTF-8">
    <title>Utilizatori - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-content">
        <div class="content-wrapper">
            <div class="header-actions">
                <h2>Management Utilizatori (Coming Soon)</h2>
            </div>
            <div id="error-msg" class="alert error"></div>
            <table>
                <thead>
                    <tr>
                        <th>Email</th>
                        <th>Activ</th>
                        <th>Data Înregistrării</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="3">Se încarcă...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            UI.init('users', 'Utilizatori');
            const tbody = document.getElementById('table-body');
            
            try {
                const data = await API.get('/admin/users');
                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3">Nu există utilizatori.</td></tr>';
                    return;
                }

                data.forEach(user => {
                    const tr = document.createElement('tr');
                    const dateStr = user.created_at ? new Date(user.created_at).toLocaleDateString('ro-RO') : '-';
                    const activeBadge = user.is_active ? '<span class="badge published">Activ</span>' : '<span class="badge archived">Inactiv</span>';
                    
                    tr.innerHTML = `
                        <td><strong>${user.email}</strong></td>
                        <td>${activeBadge}</td>
                        <td>${dateStr}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (err) {
                document.getElementById('error-msg').textContent = err.message;
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
