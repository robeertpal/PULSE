<!DOCTYPE html>
<html lang="ro">
<head>

    <meta charset="UTF-8">
    <title>Publicații - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-content">
        <div class="content-wrapper">
            <div class="header-actions">
                <h2>Lista Publicații</h2>
                <a href="content-form.html?type=publication" class="btn btn-primary">Adaugă Publicație</a>
            </div>
            <div id="error-msg" class="alert error"></div>
            <table>
                <thead><tr><th>Nume Publicație</th><th>Status</th><th>Credite</th><th>Acțiuni</th></tr></thead>
                <tbody id="table-body"><tr><td colspan="4">Se încarcă...</td></tr></tbody>
            </table>
        </div>
    </div>
    <script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            UI.init('publications', 'Publicații');
            const tbody = document.getElementById('table-body');
            try {
                const data = await API.get('/admin/publications');
                tbody.innerHTML = '';
                if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="4">Nu există publicații.</td></tr>'; return; }
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    const pubData = item.publication || {};
                    tr.innerHTML = `
                        <td><strong>${item.title}</strong></td>
                        <td><span class="badge ${item.status}">${item.status}</span></td>
                        <td>${pubData.emc_credits_text || '-'}</td>
                        <td class="table-actions"><button onclick="window.location.href='content-form.html?id=${item.id}'">Edit</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) { document.getElementById('error-msg').textContent = e.message; document.getElementById('error-msg').style.display='block'; }
        });
    </script>
</body>
</html>
