name: Security CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite:///./ci_security.db
      ENVIRONMENT: development
      ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
      ADMIN_USERNAME: admin@example.com
      ADMIN_PASSWORD_HASH: pbkdf2_sha256$120000$4a4d3d9bb8a844dca4d2f36b584f9071$3c8279f8268bf5d7124d07f8cf8f1f7cbfcfe2a0836bbd8bcb2a15ec28f4b082
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip

      - run: pip install -r requirements.txt

      - run: python -m unittest discover -s tests

      - name: Python dependency audit
        run: |
          python -m pip install pip-audit
          pip-audit --disable-pip --no-deps -r requirements.txt

  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter test
