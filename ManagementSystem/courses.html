<!DOCTYPE html>
<html lang="ro">
<head>

    <meta charset="UTF-8">
    <title>Cursuri - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-content">
        <div class="content-wrapper">
            <div class="header-actions"><h2>Lista Cursuri</h2></div>
            <div id="error-msg" class="alert error"></div>
            <table>
                <thead><tr><th>Titlu Curs</th><th>Status</th><th>Provider</th><th>Puncte EMC</th></tr></thead>
                <tbody id="table-body"><tr><td colspan="4">Se încarcă...</td></tr></tbody>
            </table>
            <p style="margin-top:20px; color:var(--text-secondary);">* Pentru creare/editare detaliată mergeți la secțiunea <b>Toate Articolele</b>.</p>
        </div>
    </div>
    <script src="js/config.js"></script><script src="js/api.js"></script><script src="js/auth.js"></script><script src="js/ui.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            UI.init('courses', 'Cursuri');
            const tbody = document.getElementById('table-body');
            try {
                const data = await API.get('/admin/courses');
                tbody.innerHTML = '';
                if(data.length === 0) { tbody.innerHTML = '<tr><td colspan="4">Nu există cursuri.</td></tr>'; return; }
                data.forEach(item => {
                    const tr = document.createElement('tr');
                    const courseData = item.course || {};
                    tr.innerHTML = `
                        <td><strong>${item.title}</strong></td>
                        <td><span class="badge ${item.status}">${item.status}</span></td>
                        <td>${courseData.provider || '-'}</td>
                        <td>${courseData.emc_credits || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch(e) { document.getElementById('error-msg').textContent = e.message; document.getElementById('error-msg').style.display='block'; }
        });
    </script>
</body>
</html>
