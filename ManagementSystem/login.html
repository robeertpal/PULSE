<!DOCTYPE html>
<html lang="ro">
<head>

    <meta charset="UTF-8">
    <title>Login - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <img src="assets/logo.png" alt="PULSE Logo" style="max-height: 60px; margin-bottom: 16px;">
            <p>Conectați-vă pentru a gestiona conținutul MedicHub</p>
            
            <div id="error-msg" class="alert error"></div>

            <form id="login-form">
                <div class="form-group">
                    <label style="text-align: left;">Email</label>
                    <input type="email" id="email" required placeholder="pulse@admin">
                </div>
                <div class="form-group">
                    <label style="text-align: left;">Parolă</label>
                    <input type="password" id="password" required placeholder="pulse@admin">
                </div>
                <button type="submit" class="btn btn-primary">Autentificare</button>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            
            try {
                const btn = e.target.querySelector('button');
                btn.textContent = 'Se verifică...';
                btn.disabled = true;
                
                await Auth.login(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
                const btn = e.target.querySelector('button');
                btn.textContent = 'Autentificare';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
