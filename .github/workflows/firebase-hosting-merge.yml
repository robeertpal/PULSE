name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build web

      - name: Add ManagementSystem to /admin
        run: |
          rm -rf build/web/admin
          mkdir -p build/web/admin
          cp -r ../ManagementSystem/* build/web/admin/

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PULSE_MEDICHUB }}
          channelId: live
          projectId: pulse-medichub
          entryPoint: mobile
