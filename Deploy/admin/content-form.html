<!DOCTYPE html>
<html lang="ro">
<head>

    <meta charset="UTF-8">
    <title>Editare Conținut - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-content">
        <div class="content-wrapper">
            <div class="header-actions">
                <a href="content.html" class="btn" style="background:#E2E8F0; color:#0F172A; text-decoration:none;">← Înapoi</a>
                <button type="button" class="btn btn-primary" onclick="saveContent()">Salvează</button>
            </div>

            <div id="alert-msg" class="alert"></div>

            <div class="form-card">
                <form id="content-form">
                    <input type="hidden" id="content-id">
                    
                    <div class="form-group">
                        <label>Tip Conținut *</label>
                        <select id="content_type" required>
                            <option value="article">Articol</option>
                            <option value="news">Știre</option>
                            <option value="course">Curs</option>
                            <option value="event">Eveniment</option>
                            <option value="publication">Publicație</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Titlu *</label>
                        <input type="text" id="title" required oninput="generateSlug()">
                    </div>

                    <div class="form-group">
                        <label>Slug (URL Friendly) *</label>
                        <input type="text" id="slug" required>
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option value="draft">Draft</option>
                            <option value="in_review">In Review</option>
                            <option value="published">Publicat</option>
                            <option value="archived">Arhivat</option>
                        </select>
                    </div>

                    <div class="form-grid">
                        <div class="form-group">
                            <label>Categorie</label>
                            <select id="category_id">
                                <option value="">Fără categorie</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Specializare</label>
                            <select id="specialization_id">
                                <option value="">Fără specializare</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Scurtă descriere</label>
                        <textarea id="short_description" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Conținut (Body - HTML/Text)</label>
                        <textarea id="body" rows="10"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>Autor</label>
                        <input type="text" id="author_name">
                    </div>

                    <div class="form-group">
                        <label>URL Imagine Principală (Hero)</label>
                        <input type="url" id="hero_image_url">
                        <div class="upload-row">
                            <input type="file" id="hero_image_file" accept="image/jpeg,image/png,image/webp">
                            <button type="button" class="btn" onclick="uploadImageFromInput('hero_image_file', 'hero_image_url')">Încarcă imagine</button>
                        </div>
                        <div id="hero_image_url_upload_status" class="upload-status"></div>
                        <div id="hero_image_url_preview" class="media-preview"></div>
                    </div>

                    <div class="form-group">
                        <label>URL Thumbnail</label>
                        <input type="url" id="thumbnail_url">
                        <div class="upload-row">
                            <input type="file" id="thumbnail_file" accept="image/jpeg,image/png,image/webp">
                            <button type="button" class="btn" onclick="uploadImageFromInput('thumbnail_file', 'thumbnail_url')">Încarcă imagine</button>
                        </div>
                        <div id="thumbnail_url_upload_status" class="upload-status"></div>
                        <div id="thumbnail_url_preview" class="media-preview"></div>
                    </div>

                    <div class="form-group">
                        <label>URL Sursă (Opțional)</label>
                        <input type="url" id="source_url">
                    </div>

                    <div class="form-group">
                        <label>Publicat la</label>
                        <input type="datetime-local" id="published_at">
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="is_featured" style="width:auto;">
                        <label style="margin:0;">Conținut Promovat (Featured)</label>
                    </div>

                    <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="is_active" style="width:auto;" checked>
                        <label style="margin:0;">Activ</label>
                    </div>

                    <section id="course-fields" class="details-section">
                        <h3>Detalii curs</h3>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Puncte EMC</label>
                                <input type="number" id="course_emc_credits" min="0" step="1">
                            </div>
                            <div class="form-group">
                                <label>Status curs</label>
                                <select id="course_status">
                                    <option value="draft">Draft</option>
                                    <option value="published">Publicat</option>
                                    <option value="archived">Arhivat</option>
                                    <option value="closed">Închis</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Valid de la</label>
                                <input type="datetime-local" id="course_valid_from">
                            </div>
                            <div class="form-group">
                                <label>Valid până la</label>
                                <input type="datetime-local" id="course_valid_until">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Provider</label>
                            <input type="text" id="course_provider">
                        </div>
                        <div class="form-group">
                            <label>URL înscriere</label>
                            <input type="url" id="course_enrollment_url">
                        </div>
                    </section>

                    <section id="event-fields" class="details-section">
                        <h3>Detalii eveniment</h3>
                        <div class="form-group">
                            <label>Oraș</label>
                            <select id="event_city_id">
                                <option value="">Fără oraș</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Locație</label>
                            <input type="text" id="event_venue_name">
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Data început *</label>
                                <input type="datetime-local" id="event_start_date">
                            </div>
                            <div class="form-group">
                                <label>Data sfârșit *</label>
                                <input type="datetime-local" id="event_end_date">
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Format participare</label>
                                <select id="event_attendance_mode">
                                    <option value="onsite">Fizic</option>
                                    <option value="online">Online</option>
                                    <option value="hybrid">Hibrid</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Tip preț</label>
                                <select id="event_price_type">
                                    <option value="free">Gratuit</option>
                                    <option value="paid">Plătit</option>
                                    <option value="subscription">Abonament</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Preț</label>
                                <input type="number" id="event_price_amount" min="0" step="0.01">
                            </div>
                            <div class="form-group">
                                <label>Puncte EMC</label>
                                <input type="number" id="event_emc_credits" min="0" step="1">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Status acreditare</label>
                            <select id="event_accreditation_status">
                                <option value="">Nesetat</option>
                                <option value="pending">În așteptare</option>
                                <option value="approved">Aprobat</option>
                                <option value="rejected">Respins</option>
                                <option value="expired">Expirat</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>URL pagină eveniment</label>
                            <input type="url" id="event_page_url">
                        </div>
                        <div class="form-group">
                            <label>URL înregistrare</label>
                            <input type="url" id="event_registration_url">
                        </div>
                        <div class="form-group">
                            <div class="section-header-inline">
                                <label>Prețuri programate</label>
                                <button type="button" class="btn" id="add_event_price_btn" onclick="showEventPriceForm()">Setează preț viitor</button>
                            </div>
                            <div id="event_current_price_info" class="price-info-card muted">Prețul curent se încarcă...</div>
                            <div id="event_price_schedule_status" class="upload-status"></div>
                            <div id="event_price_schedule_list" class="schedule-list muted">Salvați evenimentul înainte de a programa prețuri.</div>
                            <div id="event_price_form" class="inline-form-card" style="display:none;">
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label>Tip preț</label>
                                        <select id="event_future_price_type">
                                            <option value="paid">Plătit</option>
                                            <option value="free">Gratuit</option>
                                            <option value="subscription">Abonament</option>
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Valoare</label>
                                        <input type="number" id="event_future_price_amount" min="0" step="0.01">
                                    </div>
                                </div>
                                <div class="form-grid">
                                    <div class="form-group">
                                        <label>Monedă</label>
                                        <input type="text" id="event_future_price_currency" value="RON">
                                    </div>
                                    <div class="form-group">
                                        <label>Activ de la *</label>
                                        <input type="datetime-local" id="event_future_price_effective_from">
                                    </div>
                                </div>
                                <div class="inline-actions">
                                    <button type="button" class="btn" onclick="hideEventPriceForm()">Anulează</button>
                                    <button type="button" class="btn btn-primary" onclick="saveEventFuturePrice()">Salvează preț viitor</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Parteneri</label>
                            <div id="event_partners_list" class="partner-selector muted">Se încarcă partenerii...</div>
                        </div>
                    </section>

                    <section id="publication-fields" class="details-section">
                        <h3>Detalii publicație</h3>
                        <div class="form-group">
                            <label>Nume publicație</label>
                            <input type="text" id="publication_name">
                        </div>
                        <div class="form-group">
                            <label>URL logo</label>
                            <input type="url" id="publication_logo_url">
                            <div class="upload-row">
                                <input type="file" id="publication_logo_file" accept="image/jpeg,image/png,image/webp">
                                <button type="button" class="btn" onclick="uploadImageFromInput('publication_logo_file', 'publication_logo_url')">Încarcă logo</button>
                            </div>
                            <div id="publication_logo_url_upload_status" class="upload-status"></div>
                            <div id="publication_logo_url_preview" class="media-preview"></div>
                        </div>
                        <div class="form-group">
                            <label>Descriere publicație</label>
                            <textarea id="publication_description" rows="4"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Text credite EMC</label>
                            <input type="text" id="publication_emc_credits_text">
                        </div>
                        <div class="form-group">
                            <label>Text acreditare</label>
                            <textarea id="publication_creditation_text" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Text indexare</label>
                            <textarea id="publication_indexing_text" rows="3"></textarea>
                        </div>
                        <div class="form-group">
                            <label>URL abonare</label>
                            <input type="url" id="publication_subscription_url">
                        </div>
                        <div class="form-group">
                            <label>Autori</label>
                            <div id="publication_authors_list" class="partner-selector muted">Se încarcă autorii...</div>
                            <datalist id="author_role_options">
                                <option value="author"></option>
                                <option value="editor"></option>
                                <option value="reviewer"></option>
                                <option value="coordinator"></option>
                                <option value="contributor"></option>
                            </datalist>
                        </div>
                    </section>
                </form>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/forms.js"></script>
</body>
</html>
