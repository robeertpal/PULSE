<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Editare Reclamă - PULSE Management</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="main-content">
        <div class="content-wrapper">
            <div class="header-actions">
                <a href="ads.html" class="btn" style="background:#E2E8F0; color:#0F172A; text-decoration:none;">← Înapoi</a>
                <button type="button" class="btn btn-primary" onclick="saveAd()">Salvează</button>
            </div>

            <div id="alert-msg" class="alert"></div>

            <div class="ad-form-layout">
                <div class="form-card">
                    <form id="ad-form">
                        <input type="hidden" id="ad-id">

                        <div class="form-group">
                            <label>Titlu *</label>
                            <input type="text" id="title" required>
                        </div>

                        <div class="form-group">
                            <label>Descriere</label>
                            <textarea id="description" rows="3"></textarea>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Tip reclamă *</label>
                                <select id="ad_type" required></select>
                            </div>
                            <div class="form-group">
                                <label>Status *</label>
                                <select id="status" required></select>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Placement *</label>
                                <select id="placement" required></select>
                            </div>
                            <div class="form-group">
                                <label>Template design</label>
                                <select id="ad_design_template_id">
                                    <option value="">Fără template</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group" id="related-content-group">
                            <label>Content asociat</label>
                            <select id="related_content_item_id">
                                <option value="">Fără content asociat</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>URL imagine reclamă</label>
                            <input type="url" id="image_url">
                            <div class="upload-row">
                                <input type="file" id="image_file" accept="image/jpeg,image/png,image/webp">
                                <button type="button" class="btn" onclick="uploadImageFromInput('image_file', 'image_url')">Încarcă imagine</button>
                            </div>
                            <div id="image_url_upload_status" class="upload-status"></div>
                            <div id="image_url_preview" class="media-preview"></div>
                        </div>

                        <div class="form-group">
                            <label>URL imagine mobil</label>
                            <input type="url" id="mobile_image_url">
                            <div class="upload-row">
                                <input type="file" id="mobile_image_file" accept="image/jpeg,image/png,image/webp">
                                <button type="button" class="btn" onclick="uploadImageFromInput('mobile_image_file', 'mobile_image_url')">Încarcă imagine</button>
                            </div>
                            <div id="mobile_image_url_upload_status" class="upload-status"></div>
                            <div id="mobile_image_url_preview" class="media-preview"></div>
                        </div>

                        <div class="form-group">
                            <label>URL background image</label>
                            <input type="url" id="background_image_url">
                            <div class="upload-row">
                                <input type="file" id="background_image_file" accept="image/jpeg,image/png,image/webp">
                                <button type="button" class="btn" onclick="uploadImageFromInput('background_image_file', 'background_image_url')">Încarcă imagine</button>
                            </div>
                            <div id="background_image_url_upload_status" class="upload-status"></div>
                            <div id="background_image_url_preview" class="media-preview"></div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Sponsor name</label>
                                <input type="text" id="sponsor_name">
                            </div>
                            <div class="form-group">
                                <label>Prioritate</label>
                                <input type="number" id="priority" min="0" step="1" value="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>URL logo sponsor</label>
                            <input type="url" id="sponsor_logo_url">
                            <div class="upload-row">
                                <input type="file" id="sponsor_logo_file" accept="image/jpeg,image/png,image/webp">
                                <button type="button" class="btn" onclick="uploadImageFromInput('sponsor_logo_file', 'sponsor_logo_url')">Încarcă logo</button>
                            </div>
                            <div id="sponsor_logo_url_upload_status" class="upload-status"></div>
                            <div id="sponsor_logo_url_preview" class="media-preview"></div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>CTA label</label>
                                <input type="text" id="cta_label">
                            </div>
                            <div class="form-group">
                                <label>CTA URL</label>
                                <input type="url" id="cta_url">
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Începe la</label>
                                <input type="datetime-local" id="starts_at">
                            </div>
                            <div class="form-group">
                                <label>Se termină la</label>
                                <input type="datetime-local" id="ends_at">
                            </div>
                        </div>

                        <div class="form-group" style="display:flex; align-items:center; gap:10px;">
                            <input type="checkbox" id="is_active" style="width:auto;" checked>
                            <label style="margin:0;">Activ</label>
                        </div>

                        <section class="details-section active design-settings-panel">
                            <h3>Setări design reclamă</h3>

                            <div class="form-grid">
                                <div class="form-group checkbox-group">
                                    <input type="checkbox" id="show_badge" checked>
                                    <label for="show_badge">Afișează badge</label>
                                </div>
                                <div class="form-group checkbox-group">
                                    <input type="checkbox" id="show_sponsor_logo" checked>
                                    <label for="show_sponsor_logo">Afișează logo sponsor</label>
                                </div>
                            </div>

                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Text badge</label>
                                    <select id="badge_text_preset">
                                        <option value="Nou">Nou</option>
                                        <option value="Recomandat">Recomandat</option>
                                        <option value="Sponsor">Sponsor</option>
                                        <option value="Eveniment">Eveniment</option>
                                        <option value="Curs EMC">Curs EMC</option>
                                        <option value="Revistă">Revistă</option>
                                        <option value="Promovat">Promovat</option>
                                        <option value="custom">Custom</option>
                                    </select>
                                    <input type="text" id="badge_text_custom" class="conditional-input" placeholder="Text badge custom">
                                </div>

                                <div class="form-group">
                                    <label>Culoare accent</label>
                                    <select id="accent_color_preset">
                                        <option value="#2563EB">Albastru PULSE (#2563EB)</option>
                                        <option value="#0F766E">Verde medical (#0F766E)</option>
                                        <option value="#7C3AED">Mov eveniment (#7C3AED)</option>
                                        <option value="#DC2626">Roșu revistă (#DC2626)</option>
                                        <option value="#EA580C">Portocaliu promo (#EA580C)</option>
                                        <option value="custom">Custom</option>
                                    </select>
                                    <div id="accent_color_custom_group" class="color-custom-row conditional-input">
                                        <input type="color" id="accent_color_picker" value="#2563EB" aria-label="Culoare accent custom">
                                        <input type="text" id="accent_color_custom" placeholder="#2563EB">
                                    </div>
                                </div>
                            </div>

                            <div class="form-grid">
                                <div class="form-group">
                                    <label>Animație</label>
                                    <select id="animation">
                                        <option value="none">Fără animație</option>
                                        <option value="fade_in">Fade in</option>
                                        <option value="soft_pulse">Pulse subtil</option>
                                    </select>
                                </div>

                                <div class="form-group">
                                    <label>Poziție text</label>
                                    <select id="text_position">
                                        <option value="bottom_left">Jos stânga</option>
                                        <option value="center">Centru</option>
                                        <option value="top_left">Sus stânga</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Overlay imagine</label>
                                <select id="image_overlay">
                                    <option value="dark_gradient">Gradient întunecat</option>
                                    <option value="none">Fără overlay</option>
                                </select>
                            </div>

                            <details class="advanced-json">
                                <summary>Setări avansate JSON</summary>
                                <div class="form-group">
                                    <textarea id="design_config" rows="7">{}</textarea>
                                    <div id="design_config_status" class="upload-status"></div>
                                </div>
                            </details>
                        </section>
                    </form>
                </div>

                <aside class="preview-panel">
                    <h3>Preview</h3>
                    <div class="ad-preview-card">
                        <div class="ad-preview-image" id="preview-image">Fără imagine</div>
                        <div class="ad-preview-body">
                            <div class="ad-preview-meta">
                                <img id="preview-logo" class="ad-preview-logo" style="display:none;" alt="Logo sponsor">
                                <span id="preview-template">Fără template</span>
                            </div>
                            <span class="ad-preview-badge" id="preview-badge">Nou</span>
                            <div class="ad-preview-title" id="preview-title">Titlu reclamă</div>
                            <div class="ad-preview-description" id="preview-description">Descrierea reclamei apare aici.</div>
                            <span class="ad-preview-cta" id="preview-cta">Află mai mult</span>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/ad-form.js"></script>
</body>
</html>
