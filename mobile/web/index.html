  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #F8FAFC;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    /* ═══════════════════════════════════════════════════════ */
    /*  DESKTOP OVERLAY — shown when screen is too wide       */
    /* ═══════════════════════════════════════════════════════ */
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 40px rgba(200, 50, 150, 0.25), 0 20px 60px rgba(0,0,0,0.3); }
      50%      { box-shadow: 0 0 60px rgba(200, 50, 150, 0.45), 0 20px 80px rgba(0,0,0,0.35); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounceArrow {
      0%, 100% { transform: translateX(0); }
      50%      { transform: translateX(8px); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes orb1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(60px, -40px) scale(1.1); }
      66%      { transform: translate(-30px, 30px) scale(0.95); }
    }
    @keyframes orb2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(-50px, 50px) scale(1.05); }
      66%      { transform: translate(40px, -20px) scale(0.9); }
    }
    @keyframes rotateHue {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(30deg); }
    }

    #desktop-overlay {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  visibility 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #desktop-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* Deep dark background */
    .overlay-bg {
      position: absolute;
      inset: 0;
      background: #0a0a0f;
    }

    /* Animated gradient orbs */
    .overlay-bg::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200, 50, 150, 0.15) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      animation: orb1 12s ease-in-out infinite, rotateHue 20s linear infinite;
    }
    .overlay-bg::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(230, 100, 60, 0.12) 0%, transparent 70%);
      bottom: -80px;
      left: -80px;
      animation: orb2 15s ease-in-out infinite;
    }

    /* Subtle grid pattern */
    .overlay-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Content container */
    .overlay-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px;
      max-width: 520px;
      text-align: center;
    }

    /* Logo area */
    .overlay-logo {
      animation: fadeInUp 0.8s ease-out both;
    }
    .overlay-logo img {
      height: 48px;
      filter: brightness(1.1);
    }

    /* Phone mockup */
    .phone-wrapper {
      animation: fadeInUp 0.8s ease-out 0.15s both;
    }
    .phone-mockup {
      width: 220px;
      height: 440px;
      background: linear-gradient(145deg, #1a1a2e 0%, #16162a 100%);
      border-radius: 36px;
      border: 2px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      animation: float 5s ease-in-out infinite, pulseGlow 4s ease-in-out infinite;
    }

    /* Dynamic island / notch */
    .phone-notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 24px;
      background: #000;
      border-radius: 14px;
      z-index: 3;
    }

    /* Screen content — simulated app UI */
    .phone-screen {
      position: absolute;
      inset: 4px;
      border-radius: 32px;
      overflow: hidden;
      background: linear-gradient(180deg, #0f0f1a 0%, #141425 100%);
    }

    /* Simulated status bar */
    .sim-statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 8px;
      position: relative;
      z-index: 2;
    }
    .sim-time {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.3px;
    }
    .sim-icons {
      display: flex;
      gap: 4px;
    }
    .sim-icons span {
      width: 14px;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 2px;
    }

    /* Simulated header */
    .sim-header {
      padding: 8px 20px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sim-greeting {
      font-size: 15px;
      font-weight: 700;
      color: rgba(255,255,255,0.9);
    }
    .sim-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c83296, #e85d3a);
    }

    /* Simulated cards */
    .sim-card {
      margin: 8px 16px;
      height: 100px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(200, 50, 150, 0.2) 0%, rgba(230, 93, 58, 0.15) 100%);
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }
    .sim-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }
    .sim-card.small {
      height: 65px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
    }

    /* Simulated card content hints */
    .sim-card-lines {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sim-line {
      height: 8px;
      border-radius: 4px;
      background: rgba(255,255,255,0.08);
    }
    .sim-line.w60 { width: 60%; }
    .sim-line.w80 { width: 80%; }
    .sim-line.w40 { width: 40%; }

    /* Simulated nav bar */
    .sim-navbar {
      position: absolute;
      bottom: 12px;
      left: 16px;
      right: 16px;
      height: 44px;
      border-radius: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: space-around;
      backdrop-filter: blur(20px);
    }
    .sim-nav-dot {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
    }
    .sim-nav-dot.active {
      background: linear-gradient(135deg, #c83296, #e85d3a);
    }

    /* Text content */
    .overlay-text {
      animation: fadeInUp 0.8s ease-out 0.3s both;
    }
    .overlay-title {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 12px;
      line-height: 1.25;
      letter-spacing: -0.5px;
    }
    .overlay-title span {
      background: linear-gradient(135deg, #d946a8, #e85d3a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .overlay-desc {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      margin: 0;
      line-height: 1.6;
    }

    /* Resize CTA pill */
    .overlay-cta {
      animation: fadeInUp 0.8s ease-out 0.45s both;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px;
      backdrop-filter: blur(10px);
      transition: all 0.3s ease;
    }
    .overlay-cta:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }

    .cta-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c83296, #e85d3a);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cta-icon svg {
      width: 18px;
      height: 18px;
    }

    .cta-text {
      display: flex;
      flex-direction: column;
      text-align: left;
    }
    .cta-label {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }
    .cta-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin-top: 2px;
    }

    .cta-arrow {
      color: rgba(255,255,255,0.3);
      animation: bounceArrow 1.5s ease-in-out infinite;
      flex-shrink: 0;
      margin-left: 4px;
    }

    /* Divider line */
    .overlay-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      animation: fadeInUp 0.8s ease-out 0.5s both;
    }

    /* Footer hint */
    .overlay-footer {
      animation: fadeInUp 0.8s ease-out 0.55s both;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .overlay-footer .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(200, 50, 150, 0.5);
    }

    /* On mobile-width screens, hide the overlay */
    @media (max-width: 500px) {
      #desktop-overlay {
        display: none !important;
      }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body>

      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">

    </div>

  <!-- Desktop overlay visibility logic -->
  <script>
    (function() {
      var MOBILE_MAX = 500;
      var overlay = null;

      function checkWidth() {
        if (!overlay) overlay = document.getElementById('desktop-overlay');
        if (!overlay) return;
        if (window.innerWidth <= MOBILE_MAX) {
          overlay.classList.add('hidden');
        } else {
          overlay.classList.remove('hidden');
        }
      }

      // Run on load and on resize
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', checkWidth);
      } else {
        checkWidth();
      }
      window.addEventListener('resize', checkWidth);
    })();
  </script>
